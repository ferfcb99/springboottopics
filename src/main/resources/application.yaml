spring:
  application:
    name: tienda

  datasource:
    url: jdbc:mysql://localhost:3306/tienda
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always